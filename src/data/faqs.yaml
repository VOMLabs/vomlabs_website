- question: "What is VOMLabs?"
  answer: |
    VOMLabs builds Minecraft infrastructure, developer tools, and modern web platforms. Everything is open-source and built for performance.

- question: "Is VOMLabs software open source?"
  answer: |
    Yes. Most projects are fully open source and public.

    View and contribute to the code on [GitHub](https://github.com/VOMLabs).

- question: "What kind of projects does VOMLabs work on?"
  answer: |
    We maintain a suite of tools including:

    - Minecraft server software and extensions (Paper/Purpur)
    - Modern web applications and documentation platforms
    - Developer utilities and public APIs

- question: "Who is VOMLabs for?"
  answer: |
    VOMLabs is designed for engineers and players who value transparency, control, and performance.

- question: "What platforms do you support?"
  answer: |
    Support varies by project:

    - **General software:** Windows, macOS, and Linux
    - **Minecraft tools:** Java Edition (Paper and its forks)

    Check specific repository documentation for detailed requirements.

- question: "Is my data safe with VOMLabs?"
  answer: |
    Yes. We do not track users or store private credentials. Authentication is handled via secure OAuth2 protocols.

    For Minecraft plugins, we use [FastStats](https://faststats.dev) to collect anonymous, non-identifiable usage statistics.

- question: "How do I get VOMLabs software?"
  answer: |
    All releases and source code are available on our [GitHub organization](https://github.com/VOMLabs).

- question: "How do I migrate from other tools?"
  answer: |
    Our tools use standard formats to ensure portability. Migration guides for supported platforms are available in each project's documentation.

- question: "How often do you release updates?"
  answer: |
    We push updates continuously. Check individual GitHub repositories for CI/CD logs and release history.

- question: "Where can I get support or provide feedback?"
  answer: |
    Join our [Discord community](https://discord.vomlabs.com) or open an issue on GitHub.

- question: "Is VOMLabs software free to use?"
  answer: |
    Yes. Our software is free, open-source, and has no hidden tiers or premium restrictions.

- question: "Do you collect any telemetry?"
  answer: |
    We do not collect telemetry from our general tools. Minecraft plugins may collect anonymous usage data via [FastStats](https://faststats.dev) to help improve the platform.

- question: "How do I report a bug or request a feature?"
  answer: |
    Use the Issues tab on the relevant [GitHub repository](https://github.com/VOMLabs) or reach out in our Discord feedback channels.

- question: "Can I use VOMLabs tools for development?"
  answer: |
    Absolutely. Our libraries and APIs are designed to be built upon. Check our developer docs for implementation details.

- question: "Can I contribute to VOMLabs projects?"
  answer: |
    We welcome contributions. You can submit pull requests, improve documentation, or provide feedback via GitHub and Discord.

- question: "What makes VOMLabs different?"
  answer: |
    We prioritize performance and transparency over bloat. Every project is open-source and built without intrusive tracking.

- question: "How can I support VOMLabs?"
  answer: |
    The best way to support us is by contributing code, starring repositories on GitHub, and participating in our community.
